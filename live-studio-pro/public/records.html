<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Studio Pro | أرشيف VOD</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-header { text-align: center; padding: 60px 20px 40px; }
        .page-header h1 { font-size: 2.5rem; font-weight: 900; color: white; margin-bottom: 15px; }
        .page-header p { color: var(--text-dim); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }
        .gallery-container { max-width: 1200px; width: 100%; margin: 0 auto 80px; padding: 0 20px; flex: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-top: 20px; }
        .video-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md);
            overflow: hidden; transition: all 0.3s; display: flex; flex-direction: column;
        }
        .video-card:hover { transform: translateY(-5px); border-color: var(--accent-hover); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .thumb { aspect-ratio: 16/9; background: #000; position: relative; display: flex; align-items: center; justify-content: center; }
        .thumb video { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .thumb .play-icon {
            position: absolute; font-size: 2.5rem; color: rgba(255,255,255,0.8);
            pointer-events: none; transition: transform 0.2s;
        }
        .card-details { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: 700; font-size: 1.1rem; color: white; margin-bottom: 8px; word-break: break-all; }
        .card-meta { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .card-actions { display: flex; gap: 10px; margin-top: auto; }
        .btn-action {
            flex: 1; background: rgba(255,255,255,0.05); color: white;
            text-decoration: none; text-align: center; padding: 8px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 700; transition: all 0.2s; border: 1px solid var(--border);
        }
        .btn-action:hover { background: var(--accent-glow); border-color: var(--accent); color: #818cf8; }

        .empty-gallery {
            text-align: center; padding: 80px 20px; color: var(--text-dim); font-size: 1.1rem;
            grid-column: 1 / -1; background: var(--bg-card); border-radius: var(--radius-md); border: 1px dashed var(--border);
        }

        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(5px);
            z-index: 1000; display: none; align-items: center; justify-content: center;
        }
        .modal-content {
            width: 90%; max-width: 950px; background: #000; border-radius: var(--radius-md); overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        .modal video { width: 100%; display: block; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 2rem; color: white; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>
    <nav class="navbar">
        <a href="index.html" class="brand">
            <div class="brand-logo">▶</div>
            <div class="brand-text">LiveStudio<span>Pro</span></div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">الرئيسية</a></li>
            <li><a href="records.html" class="active">أرشيف VOD</a></li>
            <li><a href="settings.html">الإعدادات</a></li>
        </ul>
        <div class="nav-actions">
            <a href="studio.html" class="btn-primary">دخول الأستوديو 🚀</a>
        </div>
    </nav>

    <div class="page-header">
        <h1>مكتبة الأرشيف (VOD)</h1>
        <p>مكتبتك السحابية تضم جميع مقاطع الفيديو التي تم تسجيلها برمجياً والمحفوظة من البثوث السابقة.</p>
    </div>

    <div class="gallery-container">
        <div class="grid" id="records-grid">
            <div class="empty-gallery">يتم تحميل المكتبة...</div>
        </div>
    </div>

    <footer class="footer">
        © 2026 Live Studio Pro - جميع التسجيلات محفوظة محلياً على السيرفر الخاص بك.
    </footer>

    <div id="video-modal" class="modal" onclick="closePlayer()">
        <span class="close-modal">&times;</span>
        <div class="modal-content" onclick="event.stopPropagation()">
            <video id="modal-player" controls preload="metadata"></video>
        </div>
    </div>

    <script>
        async function fetchRecords() {
            try {
                const res = await fetch('/api/records');
                const files = await res.json();
                const grid = document.getElementById('records-grid');
                if (files.length === 0) {
                    grid.innerHTML = `<div class="empty-gallery">لا توجد أي تسجيلات محفوظة في مجلد records بعد.</div>`;
                    return;
                }
                grid.innerHTML = files.map(f => `
                    <div class="video-card">
                        <div class="thumb" onclick="playVideo('/records/${f.file}')" style="cursor:pointer">
                            <video src="/records/${f.file}#t=1" muted playsinline preload="metadata"></video>
                            <span class="play-icon">▶</span>
                        </div>
                        <div class="card-details">
                            <div class="card-title">${f.file}</div>
                            <div class="card-meta">
                                <span>صيغة: FLV</span>
                                <span>${f.size}</span>
                            </div>
                            <div class="card-actions">
                                <a href="javascript:void(0)" onclick="playVideo('/records/${f.file}')" class="btn-action">مشاهدة</a>
                                <a href="/records/${f.file}" download="${f.file}" class="btn-action">تحميل</a>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error(err);
                document.getElementById('records-grid').innerHTML = `<div class="empty-gallery" style="color:red">حدث خطأ أثناء الاتصال بالسيرفر.</div>`;
            }
        }
        
        const modal = document.getElementById('video-modal');
        const player = document.getElementById('modal-player');
        window.playVideo = (url) => {
            player.src = url;
            modal.style.display = 'flex';
            player.play().catch(e => console.log(e));
        };
        window.closePlayer = () => {
            player.pause(); player.src = "";
            modal.style.display = 'none';
        };
        fetchRecords();
    </script>
</body>
</html>
